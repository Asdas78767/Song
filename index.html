<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모바일 BGM 반복재생</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      min-height: 100vh;
      background: #111;
      color: white;
      font-family: system-ui, sans-serif;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border-radius: 10px;
      border: none;
      margin-bottom: 12px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #111;
      font-weight: bold;
      font-size: 16px;
    }

    iframe {
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <h2>유튜브 BGM 반복재생</h2>

  <input id="youtubeUrl" placeholder="유튜브 링크 붙여넣기" />

  <button id="playButton">반복재생 시작</button>

  <iframe
    id="player"
    allow="autoplay; encrypted-media"
    frameborder="0">
  </iframe>

  <script>
    const input = document.getElementById("youtubeUrl");
    const button = document.getElementById("playButton");
    const player = document.getElementById("player");

    let playing = false;

    function getVideoId(url) {
      const parsed = new URL(url);

      if (parsed.hostname.includes("youtu.be")) {
        return parsed.pathname.slice(1);
      }

      if (parsed.searchParams.has("v")) {
        return parsed.searchParams.get("v");
      }

      if (parsed.pathname.includes("/shorts/")) {
        return parsed.pathname.split("/shorts/")[1].split("/")[0];
      }

      if (parsed.pathname.includes("/embed/")) {
        return parsed.pathname.split("/embed/")[1].split("/")[0];
      }

      throw new Error("유튜브 영상 ID를 찾지 못했습니다.");
    }

    button.addEventListener("click", () => {
      if (playing) {
        player.src = "";
        button.textContent = "반복재생 시작";
        playing = false;
        return;
      }

      try {
        const videoId = getVideoId(input.value.trim());

        player.src =
          "https://www.youtube.com/embed/" + videoId +
          "?autoplay=1" +
          "&loop=1" +
          "&playlist=" + videoId +
          "&controls=0" +
          "&playsinline=1";

        button.textContent = "정지";
        playing = true;
      } catch (error) {
        alert("유튜브 링크를 제대로 넣어주세요.");
      }
    });
  </script>

</body>
</html>
